# Canonical OCI publish workflow for Krateo blueprint-fork charts (chart/ + optional
# crds-subchart/). Publishes both to the consolidated registry oci://ghcr.io/braghettos/krateo
# on a semver tag push. Identical across all single-chart krateo-* fork repos.
name: release-oci

on:
  push:
    tags: ["[0-9]+.[0-9]+.[0-9]+"]
  workflow_dispatch:
    inputs:
      chart_version:
        description: "Chart version (CHART_VERSION). Default: the git tag."
        required: false
      app_version:
        description: "App image version (APP_VERSION). Default: latest tag of APP_REPO."
        required: false

permissions:
  contents: read
  packages: write

env:
  OCI_REPO: oci://ghcr.io/braghettos/krateo
  # The application (codebase) repo whose latest semver tag is APP_VERSION (the deployed image tag).
  APP_REPO: braghettos/krateo-oasgen-provider

jobs:
  package-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set versions
        id: ver
        env:
          GH_TOKEN: ${{ github.token }}
          CHART_VERSION_INPUT: ${{ github.event.inputs.chart_version }}
          APP_VERSION_INPUT: ${{ github.event.inputs.app_version }}
        run: |
          # CHART_VERSION = CI input, else the trigger tag.
          CHART_VERSION="${CHART_VERSION_INPUT:-${GITHUB_REF_NAME}}"
          echo "chart_version=${CHART_VERSION}" >> "$GITHUB_OUTPUT"
          # APP_VERSION = CI input, else the latest semver tag of the application repo (the image
          # tag the chart deploys). Only consumed by charts that ship an image (appVersion: APP_VERSION);
          # charts with no image have no appVersion, so this is a no-op for them.
          if [ -n "${APP_VERSION_INPUT}" ]; then
            APP_VERSION="${APP_VERSION_INPUT}"
          else
            APP_VERSION="$(gh api "repos/${APP_REPO}/tags" --paginate --jq '.[].name' \
              | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1)"
          fi
          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "resolved: CHART_VERSION=${CHART_VERSION}  APP_VERSION=${APP_VERSION}  (APP_REPO=${APP_REPO})"

      - name: Substitute version placeholders
        run: |
          for f in chart/Chart.yaml crds-subchart/Chart.yaml; do
            [ -f "$f" ] || continue
            sed -i "s/CHART_VERSION/${{ steps.ver.outputs.chart_version }}/g" "$f"
            sed -i "s/APP_VERSION/${{ steps.ver.outputs.app_version }}/g" "$f"
          done

      - name: Helm setup
        uses: azure/setup-helm@v4
        with:
          version: v3.19.0

      - name: Registry login
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Package & push crds-subchart (if present)
        run: |
          if [ -f crds-subchart/Chart.yaml ]; then
            helm package crds-subchart -d dist/
            helm push dist/*-crd-*.tgz "${OCI_REPO}" 2>/dev/null || helm push "$(ls dist/*.tgz | head -1)" "${OCI_REPO}"
            rm -rf dist
          fi

      - name: Build deps & package chart
        run: |
          helm dependency build chart || true
          helm package chart -d dist/

      - name: Push chart
        run: helm push dist/*.tgz "${OCI_REPO}"
